decisions_made:
  - decision: "Cinematic replays every new browser session (sessionStorage, not localStorage)"
    rationale: "sessionStorage dies with the tab. New tab = fresh cinematic. Same-tab navigation skips replay. Matches existing tsc-sid pattern."
    reversible: true
  - decision: "GAME OVER never appears standalone — only inside cinematic intro"
    rationale: "User directive. The narrative arc requires GAME OVER as the opening act, with 'See Marketing in a Whole New Light' as the permanent homepage state after the cinematic."
    reversible: true
  - decision: "Sound is opt-in via button click (not autoplay)"
    rationale: "Browser autoplay policies block audio without user gesture. Graceful silent fallback preserves the visual experience."
    reversible: false
  - decision: "Retro game screen uses CSS/HTML (not canvas)"
    rationale: "Content is text-based (scores, hearts, GAME OVER). CSS transforms are GPU-accelerated. No animation loop needed."
    reversible: true
  - decision: "Three.js particles deferred until Phase 7 rebirth"
    rationale: "Zero GPU cost during the 13s cinematic. Particles mount via existing requestIdleCallback when HeroSection renders."
    reversible: false
  - decision: "CRT shutdown uses 3-stage CSS transforms (scaleY→scaleX→opacity)"
    rationale: "Physically accurate CRT power-off behavior. CSS transforms are GPU-accelerated and don't require canvas."
    reversible: true
  - decision: "Score '002026' on retro screen = the year disguised as a game score"
    rationale: "Subtle double-meaning Easter egg. Player 'scored' 2026 before dying — the old marketing paradigm ended in the current year."
    reversible: true

