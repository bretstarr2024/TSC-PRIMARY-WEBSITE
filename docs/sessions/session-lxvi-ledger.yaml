decisions_made:
  - decision: "The green retro arcade screen IS the entire opening — no separate gradient headline"
    rationale: "User directive. The Session LXV version had a confusing two-part structure (gradient GAME OVER then tiny green screen). The green screen should be the whole show."
    reversible: false
  - decision: "RetroGameScreen fills entire viewport (no max-width constraint)"
    rationale: "User feedback: the green arcade screen was 'very small' at max-w-2xl (672px). Full viewport creates the immersive CRT-in-your-face experience."
    reversible: true
  - decision: "Subhead appears ON the green arcade screen in phosphor green"
    rationale: "User directive: 'actually on the arcade screen.' Styled in dim phosphor green to match the retro aesthetic."
    reversible: true
  - decision: "Nothing fancy for subhead animation"
    rationale: "User directive: 'Nothing fancy, because fancy wasn't possible in these old arcade games.' Simple quick fade-in only."
    reversible: true
  - decision: "No sessionStorage gating — cinematic replays on every page load"
    rationale: "User couldn't replay on refresh. sessionStorage persists across refreshes within the same tab. Skip button handles repeat visits."
    reversible: true
  - decision: "Sound button visible at bottom-center with border"
    rationale: "Previous button was 10px at 40% opacity in bottom-right corner — invisible. Now centered, larger, bordered, 70% opacity."
    reversible: true
  - decision: "CRT shutdown phase extended to ~2.5s"
    rationale: "User said CRT shutdown looked good but was too fast at 1.5s. Line now 1.0s, dot 1.8s."
    reversible: true

