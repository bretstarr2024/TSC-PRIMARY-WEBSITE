decisions_made:
  - decision: "Custom cursor permanently removed"
    rationale: "User directive: 'that animated pointer cursor thing drives me nuts.' Default system pointer restored site-wide."
    reversible: true
  - decision: "Hero always-mounted behind cinematic overlay"
    rationale: "Conditional mounting caused HeroParticles dynamic import + requestIdleCallback + IntersectionObserver delays, producing visible flash. Pre-mounting gives 9.5s for full initialization."
    reversible: true
  - decision: "Sound engine uses single merged useEffect"
    rationale: "Two separate useEffects raced — effect 2 read soundRef.current as null because both ran after the same render. Merging eliminates the race condition class entirely."
    reversible: true
  - decision: "Subhead uses h-0 overflow-visible wrapper"
    rationale: "The subhead was a flex child that caused justify-center to redistribute, pushing GAME OVER up. The wrapper takes zero height in flex layout but content remains visible."
    reversible: true

