decisions_made:
  - decision: "Interaction listener fallback for AudioContext autoplay"
    rationale: "Browsers universally require a user gesture before allowing AudioContext to produce sound. The enable() method now detects this and registers document-level listeners. Sounds scheduled on the suspended context play when the user first clicks/taps/types anywhere."
    reversible: true
  - decision: "Subhead reading time doubled from 3s to 6s"
    rationale: "User couldn't read the subhead in 3 seconds. Explicit directive: 'double the time.'"
    reversible: true
  - decision: "Homepage cinematic declared DONE"
    rationale: "User stated 'If we could just get those two details correct, we could call the homepage done for good.'"
    reversible: false

