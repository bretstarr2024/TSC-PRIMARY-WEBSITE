    mitigation: "This is an immutable browser policy. The interaction listener fallback is the industry-standard solution. On repeat visits, browsers may allow autoplay via Media Engagement Index."
    severity: low
  - risk: "unsafe-inline still in CSP script-src and style-src"
    mitigation: "Deferred to future session. Removing requires nonce-based CSP middleware and page-by-page testing."
    severity: medium
